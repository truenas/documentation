<!-- Creates a marketing-style introductory banner for TrueNAS hardware landing pages.
Two-column layout: title and optional subtitle on the left, product image on the right.
Parameters:
 - title       : H1 heading text
 - subtitle    : optional mid-level text under the heading
 - tagline     : optional smaller descriptive line under the subtitle
 - productlink : optional URL for the product page button
 - linklabel   : optional button label (default: "Visit the product page")
 - imgurl      : URL or absolute path to the product image
 - imgalt      : alt and title text for the image
 - imgwidth    : image width in pixels (optional)
 - imgheight   : image height in pixels (optional)
-->
<div class="prodintro-banner">
  <div class="prodintro-banner__content">
    <h1>{{ .Get "title" }}</h1>
    {{ with .Get "subtitle" }}<p class="prodintro-subtitle">{{ . }}</p>{{ end }}
    {{ with .Get "tagline" }}<p class="prodintro-tagline">{{ . }}</p>{{ end }}
    {{ with .Get "productlink" }}
    <a class="prodintro-btn" href="{{ . }}">{{ with $.Get "linklabel" }}{{ . }}{{ else }}Visit the product page{{ end }}</a>
    {{ end }}
  </div>
  <div class="prodintro-banner__image">
    <img loading="lazy" decoding="async"
         src="{{ .Get "imgurl" }}"
         alt="{{ .Get "imgalt" }}"
         title="{{ .Get "imgalt" }}"
         {{ with .Get "imgwidth" }}width="{{ . }}"{{ end }}
         {{ with .Get "imgheight" }}height="{{ . }}"{{ end }}>
  </div>
</div>
