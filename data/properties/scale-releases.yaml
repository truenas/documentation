---
# This file is pulled by the API Docs Jenkins pipeline to match SCALE versions with API versions.
#
# Each entry under `majorVersions` carries a `state` field that drives lifecycle
# labeling and visibility across the documentation and api-docs sites. Allowed values:
#
#   preview   Nightly / pre-pre-release — no Beta or RC yet.
#             Rendered as "TrueNAS X.Y (Preview)" on the api-docs version selector.
#
#   early     Beta / RC tracking — umbrella term for BETA and RC builds.
#             Rendered as "TrueNAS X.Y (Early)" on the api-docs version selector.
#
#   ga        Current general-availability release, actively maintained.
#             Rendered as "TrueNAS X.Y" (no qualifier) on the api-docs version selector.
#
#   previous  Prior GA release, still supported but no longer current.
#             Rendered as "TrueNAS X.Y" (no qualifier) on the api-docs version selector.
#
#   archived  Older release moved off the main version selector and Release Schedule
#             to keep them focused on currently-relevant versions. This is a curation
#             decision (declining usage), not a statement about maintenance — by the
#             time a version is archived, engineering has typically long since moved
#             on to newer ones. API docs remain accessible at api.truenas.com/vX.Y/,
#             served from the storj-preserved snapshot; they are not regenerated by
#             future builds. Surfaced on api.truenas.com/archive/.
#
# Transitions are data-only: flipping the `state` field is sufficient to update all
# downstream consumers. Archival additionally requires a one-time snapshot commit to
# api-docs/archive-backups/vX.Y/ as a disaster-recovery backup (see api-docs README).
id: "scale-schedule"
